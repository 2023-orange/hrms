#jwt
jwt:
  # 令牌header关键字
  header: Authorization
  # 刷新令牌header关键字
  refresh-header: RefreshAuthorization
  # 令牌类型代码
  access-token-type: AccessToken
  # 刷新令牌类型代码
  refresh-token-type: RefreshToken
  # 令牌前缀
  token-start-with: Bearer
  # 必须使用最少88位的Base64对该令牌进行编码
  base64-secret: ZmQ0ZGI5NjQ0MDQwY2I4MjMxY2Y3ZmI3MjdhN2ZmMjNhODViOTg1ZGE0NTBjMGM4NDA5NzYxMjdjOWMwYWRmZTBlZjlhNGY3ZTg4Y2U3YTE1ODVkZDU5Y2Y3OGYwZWE1NzUzNWQ2YjFjZDc0NGMxZWU2MmQ3MjY1NzJmNTE0MzI=
  # token 过期时间/毫秒，0.5小时  1小时 = 3600000 毫秒
  expiration: 14400000
  # refreshtoken 过期时间/毫秒，1小时  1小时 = 3600000 毫秒
  refresh-expiration: 16200000
  # token 更新后保持旧token时间/毫秒，30秒
  token-keep-expiration: 30000
  # 在线用户key
  online-key: online-token
  # 更换token暂时保持在线用户key
  keep-online-key: keep-online-token
  # 验证码
  code-key: code-key

