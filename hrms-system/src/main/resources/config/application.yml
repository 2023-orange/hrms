server:
#  port: 8085
  #测试环境
  port: 8080
  #正式环境
#  port: 8180
  servlet:
    context-path: /hrms-system
  tomcat:
    uri-encoding: UTF-8
    #最小线程数
    min-spare-threads: 500
    #最大线程数
    max-threads: 2500
    #最大链接数
    max-connections: 6500
    #最大等待队列长度
    accept-count: 1000
    #请求头最大长度kb
    max-http-header-size: 1048576
    #请请求体最大长度kb
    #max-http-post-size: 2097152

spring:
  freemarker:
    check-template-location: false
  profiles:
    active: tba
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: true
  data:
    redis:
      repositories:
        enabled: false
  redis:
    #数据库索引
    database: 0
    host: 127.0.0.1
    port: 6379
    password: sunten#hr2020
    #连接超时时间
    timeout: 5000

logging:
  config: classpath:logback-spring.xml

#  #配置 Jpa
#  jpa:
#    properties:
#      hibernate:
#        #dialect: org.hibernate.dialect.MySQLDialect #SQLServerDialect
#        dialect: org.hibernate.dialect.SQLServerDialect
#    open-in-view: true



task:
  pool:
    # 核心线程池大小
    core-pool-size: 10
    # 最大线程数
    max-pool-size: 30
    # 活跃时间
    keep-alive-seconds: 60
    # 队列容量
    queue-capacity: 50

#七牛云
qiniu:
  # 文件大小 /M
  max-size: 15

#邮箱验证码有效时间/分钟
code:
  expiration: 5

#登录图形验证码有效时间/分钟
loginCode:
  expiration: 2

sunten:
  system-name: SUNTEN人力资源管理系统
  date-time-formatter: yyyy-MM-dd HH:mm:ss
  date-formatter: yyyy-MM-dd
  time-formatter: HH:mm:ss
  default-password: 123456
  role-permission:
    data-processor: regime
  in-sunten-email-server-id: 7
  out-sunten-email-server-id: 8
  startup-report:
    send-to: tanba@in-sunten.com
    send-profiles: prod
