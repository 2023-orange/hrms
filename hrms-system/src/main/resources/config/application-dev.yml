#配置数据源
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    dynamic:
      #指定默认链接的 数据源
      primary: hrms
      datasource:
        #指定多个数据源链接信息 名称可自己指定
        hrms:
          url: jdbc:sqlserver://172.18.1.131:1433;DatabaseName=HRMS2020 #jdbc:log4jdbc:sqlserver://172.18.1.131:1433;DatabaseName=HRMS2020
          username: hrms
          password: sernthrms
          driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver #net.sf.log4jdbc.sql.jdbcapi.DriverSpy
        erp:
          url: jdbc:oracle:thin:@192.168.200.9:1533:DEV
          username: crm
          password: crmora
          driver-class-name: oracle.jdbc.OracleDriver
        oa:
          url: jdbc:mysql://192.168.200.39:3307/oa_normal?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false
          username: root
          password: sunten88
          driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      # 初始化配置
      initial-size: 3
      # 最小连接数
      min-idle: 3
      # 最大连接数l
      max-active: 15
      # 获取连接超时时间
      max-wait: 5000
      # 连接有效性检测时间
      time-between-eviction-runs-millis: 90000
      # 最大空闲时间
      min-evictable-idle-time-millis: 1800000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: select 1
      # 配置监控统计拦截的filters
      filters: stat
      stat-view-servlet:
        url-pattern: /druid/*
        reset-enable: false
        # login-username: root
        # login-password: root
        enabled: true
        allow:
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.bmp,*.png,*.css,*.ico,/druid/*"
